version: '3.8'

services:
  # Backend Application
  # Connects to existing PostgreSQL database on EC2 host
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.aws
    container_name: farmtime-backend-aws
    environment:
      SPRING_PROFILES_ACTIVE: aws
      # Connect to PostgreSQL on EC2 host (using localhost since network_mode: host)
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/farmtime_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password123
      JWT_SECRET: ${JWT_SECRET:-farmtime-secret-key-for-jwt-token-generation-change-this-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:19006,http://localhost:8081,http://13.127.116.232:8080,http://13.127.116.232:19006}
      JAVA_OPTS: "-Xms512m -Xmx1024m"
    ports:
      - "8080:8080"
    network_mode: "host"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
