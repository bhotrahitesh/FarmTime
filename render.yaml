services:
  - type: web
    name: farmtime-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: singapore
    branch: main
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: farmtime-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: farmtime-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: farmtime-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 86400000
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: JAVA_OPTS
        value: -Xms256m -Xmx512m

databases:
  - name: farmtime-db
    databaseName: farmtime_db
    plan: free
    region: singapore
