# Production Configuration
server.port=8080
spring.application.name=farmtime-backend

# PostgreSQL Database Configuration - UPDATE FOR PRODUCTION
spring.datasource.url=jdbc:postgresql://your-production-db-host:5432/farmtime_db
spring.datasource.username=your_production_username
spring.datasource.password=your_production_password
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Configuration
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.leak-detection-threshold=60000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration - CHANGE THIS SECRET KEY
jwt.secret=CHANGE-THIS-TO-A-VERY-LONG-AND-SECURE-SECRET-KEY-FOR-PRODUCTION
jwt.expiration=86400000

# CORS Configuration - UPDATE WITH YOUR MOBILE APP DOMAIN
cors.allowed.origins=https://your-mobile-app-domain.com

# Scheduled Tasks
spring.task.scheduling.pool.size=2

# Logging
logging.level.com.farmtime=INFO
logging.level.org.springframework.security=WARN
logging.file.name=logs/farmtime.log
logging.file.max-size=10MB
logging.file.max-history=30
