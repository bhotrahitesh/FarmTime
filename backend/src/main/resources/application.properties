# Server Configuration
server.port=8080
spring.application.name=farmtime-backend

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/farmtime_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Configuration
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.leak-detection-threshold=60000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# JWT Configuration
jwt.secret=farmtime-secret-key-for-jwt-token-generation-change-this-in-production
jwt.expiration=86400000

# CORS Configuration
cors.allowed.origins=http://localhost:19006,http://localhost:8081,http://192.168.*.*:19006,http://192.168.*.*:8081

# Scheduled Tasks
spring.task.scheduling.pool.size=2

# Auto-Attendance Configuration
# Schedule: Daily at 7:00 AM IST (cron: second minute hour day month weekday)
attendance.auto.mark.cron=0 0 7 * * *
attendance.auto.mark.enabled=true
attendance.auto.mark.timezone=Asia/Kolkata

# Data Retention Configuration (in days - testing phase)
data.retention.months=2
data.retention.days=2
# Cleanup schedule: Run daily at 2 AM (cron: second minute hour day month weekday)
data.cleanup.cron=0 0 2 * * ?

# Salary Configuration
# Global salary payday (day of month: 1-31)
salary.payday=10

# Timezone Configuration
spring.jackson.time-zone=Asia/Kolkata
spring.jackson.date-format=yyyy-MM-dd

# Logging
logging.level.com.farmtime=DEBUG
logging.level.org.springframework.security=DEBUG
