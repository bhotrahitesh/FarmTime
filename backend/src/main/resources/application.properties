# Server Configuration
server.port=8080
spring.application.name=farmtime-backend

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/farmtime_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=farmtime-secret-key-for-jwt-token-generation-change-this-in-production
jwt.expiration=86400000

# CORS Configuration
cors.allowed.origins=http://localhost:19006,http://localhost:8081,http://192.168.*.*:19006,http://192.168.*.*:8081

# Scheduled Tasks
spring.task.scheduling.pool.size=2

# Logging
logging.level.com.farmtime=DEBUG
logging.level.org.springframework.security=DEBUG
