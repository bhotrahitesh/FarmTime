# AWS Production Configuration
# Server Configuration
server.port=8080
spring.application.name=farmtime-backend

# AWS RDS PostgreSQL Database Configuration
# These will be overridden by environment variables in production
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/farmtime_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password123}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Configuration for AWS RDS
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.leak-detection-threshold=60000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# JWT Configuration
jwt.secret=${JWT_SECRET:farmtime-secret-key-for-jwt-token-generation-change-this-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS Configuration
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:19006,http://localhost:8081,http://13.127.116.232:8080,http://13.127.116.232:19006,http://13.127.116.232}

# Scheduled Tasks
spring.task.scheduling.pool.size=2

# Auto-Attendance Configuration
# Schedule: Daily at 7:00 AM IST (cron: second minute hour day month weekday)
attendance.auto.mark.cron=${ATTENDANCE_AUTO_MARK_CRON:0 0 7 * * *}
attendance.auto.mark.enabled=${ATTENDANCE_AUTO_MARK_ENABLED:true}
attendance.auto.mark.timezone=${ATTENDANCE_AUTO_MARK_TIMEZONE:Asia/Kolkata}

# Data Retention Configuration (in days - testing phase)
data.retention.months=${DATA_RETENTION_MONTHS:2}
data.retention.days=${DATA_RETENTION_DAYS:2}
data.cleanup.cron=${DATA_CLEANUP_CRON:0 0 2 * * ?}

# Salary Configuration
salary.payday=${SALARY_PAYDAY:10}

# Timezone Configuration
spring.jackson.time-zone=Asia/Kolkata
spring.jackson.date-format=yyyy-MM-dd

# Logging for Production
logging.level.com.farmtime=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN

# Health Check Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true
